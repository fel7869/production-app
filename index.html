<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="产量统计">
    <title>产量统计助手</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-item .label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .stat-item .value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-bar select {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .record-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .record-info {
            flex: 1;
        }
        
        .record-info .date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .record-info .detail {
            font-size: 14px;
            color: #333;
            margin-bottom: 3px;
        }
        
        .record-info .price {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }
        
        .record-actions {
            display: flex;
            gap: 8px;
        }
        
        .record-edit, .record-delete {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .record-edit {
            background: #4CAF50;
            color: white;
        }
        
        .record-delete {
            background: #ff5252;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state::before {
            content: '📋';
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.1);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #999;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-item.active {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .nav-item .icon {
            font-size: 24px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .month-stats {
            margin-bottom: 15px;
        }
        
        .month-stats .total {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .month-stats .amount {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
        
        .btn-secondary {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
            margin-top: 10px;
        }
        
        .btn-secondary:active {
            background: #f0f0f0;
        }
        
        @media (max-width: 360px) {
            body {
                padding: 15px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 产量统计助手</h1>
            <p>轻松记录，智能统计</p>
        </div>
        
        <!-- 首页 - 录入 -->
        <div id="page-home" class="page active">
            <div class="card">
                <div class="card-title">今日录入</div>
                
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="input-date">
                </div>
                
                <div class="form-group">
                    <label>型号</label>
                    <input type="text" id="input-model" placeholder="请输入型号" oninput="autoFillPrice()">
                </div>
                
                <div class="form-group">
                    <label>加工类型</label>
                    <select id="input-type" onchange="autoFillPrice()">
                        <option value="">请选择加工类型</option>
                        <option value="油封">油封</option>
                        <option value="皮带轮">皮带轮</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>加工数量</label>
                    <input type="number" id="input-quantity" placeholder="请输入数量">
                </div>
                
                <div class="form-group">
                    <label>单价（元）</label>
                    <input type="number" id="input-price" placeholder="请输入单价" step="0.01">
                </div>
                
                <div class="form-group">
                    <label>小计：<span id="subtotal" style="color: #667eea; font-size: 20px; font-weight: 600;">0.00</span> 元</label>
                </div>
                
                <button class="btn btn-primary" id="save-btn" onclick="saveRecord()">💾 保存记录</button>
            </div>
        </div>
        
        <!-- 统计页 -->
        <div id="page-stats" class="page">
            <div class="stats">
                <div class="stat-item">
                    <div class="label">今日合计</div>
                    <div class="value" id="today-total">¥0</div>
                </div>
                <div class="stat-item">
                    <div class="label">本月合计</div>
                    <div class="value" id="month-total">¥0</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📅 月度统计</div>
                <div class="form-group">
                    <label>选择月份查看</label>
                    <input type="month" id="filter-month" onchange="filterByMonth()">
                </div>
                <div class="month-stats" id="selected-month-stats" style="display: none;">
                    <div class="total">选中月份合计</div>
                    <div class="amount" id="selected-month-total">¥0.00</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📊 所有月份统计</div>
                <div id="monthly-summary"></div>
            </div>
        </div>
        
        <!-- 记录页 -->
        <div id="page-records" class="page">
            <div class="card">
                <div class="card-title">历史记录</div>
                
                <div class="filter-bar">
                    <select id="filter-model" onchange="filterRecords()">
                        <option value="">全部型号</option>
                    </select>
                    <select id="filter-type" onchange="filterRecords()">
                        <option value="">全部类型</option>
                    </select>
                </div>
                
                <div class="record-list" id="record-list">
                    <div class="empty-state">暂无记录</div>
                </div>
                
                <button class="btn btn-secondary" onclick="exportToExcel()">📥 导出为Excel表格</button>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')">
            <span class="icon">✏️</span>
            <span>录入</span>
        </div>
        <div class="nav-item" onclick="showPage('stats')">
            <span class="icon">📊</span>
            <span>统计</span>
        </div>
        <div class="nav-item" onclick="showPage('records')">
            <span class="icon">📋</span>
            <span>记录</span>
        </div>
    </div>
    
    <script>
        // 数据存储
        let records = JSON.parse(localStorage.getItem('production_records') || '[]');
        let editingId = null; // 当前编辑的记录ID
        
        // 价格表（型号-加工类型 -> 单价）
        const priceTable = {
            '全柴490-油封': 1.3,
            'W490-皮带轮': 2.6,
            'VC495-油封': 1.3,
            '4102-皮带轮': 1.1,
            'W490-油封': 1.5,
            'W490-皮带轮': 1.1,
            '1JG-皮带轮': 2.6,
            '常柴490-皮带轮': 1.1,
            '常柴490-油封': 1.5,
            '4102-油封': 1.3,
            'VC495-皮带轮': 1.1
        };
        
        // 自动填充单价
        function autoFillPrice() {
            const model = document.getElementById('input-model').value.trim();
            const type = document.getElementById('input-type').value;
            
            if (!model || !type) {
                return;
            }
            
            // 不区分大小写匹配
            const key = `${model}-${type}`;
            const matchedKey = Object.keys(priceTable).find(k => 
                k.toLowerCase() === key.toLowerCase()
            );
            
            if (matchedKey) {
                document.getElementById('input-price').value = priceTable[matchedKey];
                calculateSubtotal();
            }
        }
        
        // 初始化日期为今天
        document.getElementById('input-date').valueAsDate = new Date();
        
        // 实时计算小计
        function calculateSubtotal() {
            const quantity = parseFloat(document.getElementById('input-quantity').value) || 0;
            const price = parseFloat(document.getElementById('input-price').value) || 0;
            const subtotal = quantity * price;
            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
        }
        
        document.getElementById('input-quantity').addEventListener('input', calculateSubtotal);
        document.getElementById('input-price').addEventListener('input', calculateSubtotal);
        
        // 保存记录
        function saveRecord() {
            const date = document.getElementById('input-date').value;
            const model = document.getElementById('input-model').value.trim();
            const type = document.getElementById('input-type').value.trim();
            const quantity = parseFloat(document.getElementById('input-quantity').value);
            const price = parseFloat(document.getElementById('input-price').value);
            
            if (!date || !model || !type || !quantity || !price) {
                alert('请填写完整信息！');
                return;
            }
            
            if (editingId) {
                // 编辑模式
                const index = records.findIndex(r => r.id === editingId);
                if (index !== -1) {
                    records[index] = {
                        id: editingId,
                        date,
                        model,
                        type,
                        quantity,
                        price,
                        subtotal: quantity * price
                    };
                }
                editingId = null;
                document.getElementById('save-btn').textContent = '💾 保存记录';
                alert('✅ 修改成功！');
            } else {
                // 新增模式
                const record = {
                    id: Date.now(),
                    date,
                    model,
                    type,
                    quantity,
                    price,
                    subtotal: quantity * price
                };
                
                records.push(record);
                alert('✅ 保存成功！');
            }
            
            localStorage.setItem('production_records', JSON.stringify(records));
            
            // 清空表单
            document.getElementById('input-model').value = '';
            document.getElementById('input-type').value = '';
            document.getElementById('input-quantity').value = '';
            document.getElementById('input-price').value = '';
            document.getElementById('subtotal').textContent = '0.00';
            
            updateStats();
            updateFilters();
        }
        
        // 更新统计数据
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayRecords = records.filter(r => r.date === today);
            const todayTotal = todayRecords.reduce((sum, r) => sum + r.subtotal, 0);
            
            document.getElementById('today-total').textContent = '¥' + todayTotal.toFixed(0);
            
            // 当前月份统计
            const currentMonth = new Date().toISOString().slice(0, 7);
            const monthRecords = records.filter(r => r.date.startsWith(currentMonth));
            const monthTotal = monthRecords.reduce((sum, r) => sum + r.subtotal, 0);
            document.getElementById('month-total').textContent = '¥' + monthTotal.toFixed(0);
            
            // 显示所有月份统计
            updateMonthlySummary();
        }
        
        // 更新所有月份统计
        function updateMonthlySummary() {
            // 按月份分组
            const monthGroups = {};
            records.forEach(r => {
                const month = r.date.slice(0, 7);
                if (!monthGroups[month]) monthGroups[month] = 0;
                monthGroups[month] += r.subtotal;
            });
            
            // 按月份倒序排序
            const sortedMonths = Object.keys(monthGroups).sort((a, b) => b.localeCompare(a));
            
            let html = '';
            sortedMonths.forEach(month => {
                const total = monthGroups[month];
                const [year, mon] = month.split('-');
                html += `
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="font-size: 16px; font-weight: 600; color: #333;">${year}年${parseInt(mon)}月</div>
                            <div style="font-size: 20px; font-weight: 700; color: #667eea;">¥${total.toFixed(2)}</div>
                        </div>
                    </div>
                `;
            });
            
            if (sortedMonths.length === 0) {
                html = '<div class="empty-state" style="padding: 20px;">暂无数据</div>';
            }
            
            document.getElementById('monthly-summary').innerHTML = html;
        }
        
        // 更新筛选器选项
        function updateFilters() {
            const models = [...new Set(records.map(r => r.model))];
            
            const modelSelect = document.getElementById('filter-model');
            modelSelect.innerHTML = '<option value="">全部型号</option>';
            models.forEach(m => {
                modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
            
            const typeSelect = document.getElementById('filter-type');
            typeSelect.innerHTML = '<option value="">全部类型</option>';
            typeSelect.innerHTML += '<option value="油封">油封</option>';
            typeSelect.innerHTML += '<option value="皮带轮">皮带轮</option>';
        }
        
        // 筛选记录
        function filterRecords() {
            const modelFilter = document.getElementById('filter-model').value;
            const typeFilter = document.getElementById('filter-type').value;
            
            let filtered = records;
            if (modelFilter) filtered = filtered.filter(r => r.model === modelFilter);
            if (typeFilter) filtered = filtered.filter(r => r.type === typeFilter);
            
            displayRecords(filtered);
        }
        
        // 按月份筛选
        function filterByMonth() {
            const month = document.getElementById('filter-month').value;
            if (!month) {
                document.getElementById('selected-month-stats').style.display = 'none';
                return;
            }
            
            const monthRecords = records.filter(r => r.date.startsWith(month));
            const monthTotal = monthRecords.reduce((sum, r) => sum + r.subtotal, 0);
            
            const [year, mon] = month.split('-');
            document.getElementById('selected-month-total').textContent = '¥' + monthTotal.toFixed(2);
            document.getElementById('selected-month-stats').style.display = 'block';
        }
        
        // 显示记录列表
        function displayRecords(recordList) {
            const container = document.getElementById('record-list');
            
            if (recordList.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }
            
            // 按日期倒序排序
            const sorted = [...recordList].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = sorted.map(r => `
                <div class="record-item">
                    <div class="record-info">
                        <div class="date">${r.date}</div>
                        <div class="detail">${r.model} · ${r.type} · ${r.quantity}件 × ¥${r.price}</div>
                        <div class="price">¥${r.subtotal.toFixed(2)}</div>
                    </div>
                    <div class="record-actions">
                        <button class="record-edit" onclick="editRecord(${r.id})">✎</button>
                        <button class="record-delete" onclick="deleteRecord(${r.id})">×</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 删除记录
        function deleteRecord(id) {
            if (!confirm('确定删除这条记录吗？')) return;
            
            records = records.filter(r => r.id !== id);
            localStorage.setItem('production_records', JSON.stringify(records));
            
            updateStats();
            updateFilters();
            filterRecords();
        }
        
        // 编辑记录
        function editRecord(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            
            // 切换到录入页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-home').classList.add('active');
            document.querySelector('.nav-item').classList.add('active');
            
            // 填充数据
            document.getElementById('input-date').value = record.date;
            document.getElementById('input-model').value = record.model;
            document.getElementById('input-type').value = record.type;
            document.getElementById('input-quantity').value = record.quantity;
            document.getElementById('input-price').value = record.price;
            document.getElementById('subtotal').textContent = record.subtotal.toFixed(2);
            
            // 设置编辑模式
            editingId = id;
            document.getElementById('save-btn').textContent = '✏️ 修改记录';
        }
        
        // 导出为Excel
        function exportToExcel() {
            if (records.length === 0) {
                alert('暂无数据可导出！');
                return;
            }
            
            // 按日期排序
            const sorted = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // 创建CSV内容（Excel兼容）
            let csv = '\uFEFF'; // UTF-8 BOM，防止中文乱码
            csv += '日期,型号,加工类型,数量,单价(元),小计(元)\n';
            
            sorted.forEach(r => {
                csv += `${r.date},${r.model},${r.type},${r.quantity},${r.price},${r.subtotal.toFixed(2)}\n`;
            });
            
            // 添加总计行
            const total = sorted.reduce((sum, r) => sum + r.subtotal, 0);
            csv += `\n合计,,,,,${total.toFixed(2)}\n`;
            
            // 创建下载链接
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `产量统计_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('✅ 导出成功！请用Excel打开下载的文件。');
        }
        
        // 切换页面
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + pageName).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (pageName === 'stats') {
                updateStats();
            } else if (pageName === 'records') {
                updateFilters();
                displayRecords(records);
            }
        }
        
        // 初始化
        updateStats();
        updateFilters();
        
        // 注册 Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 注册成功'))
                .catch(err => console.log('Service Worker 注册失败', err));
        }
    </script>
</body>
</html>
